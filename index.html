<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>读书笔记 - 我的阅读时光</title>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
    <!-- 雪山背景层 -->
    <div class="snow-mountain-bg"></div>
    
    <!-- 标题区域 -->
    <section class="hero-section">
        <h1 class="gradient-title">Never Stop Learning</h1>
        <p class="hero-subtitle">学无止境 · 读万卷书</p>
    </section>
    
    <div class="container">
        <!-- 头部导航 -->
        <header class="header">
            <div class="logo">
                <h1 data-i18n="siteTitle">📚 读书笔记</h1>
                <p class="subtitle" data-i18n="siteSubtitle">记录阅读的美好时光</p>
            </div>
            <div class="header-actions">
                <button class="lang-switcher" onclick="toggleLanguage()">
                    <span id="current-lang">🇨🇳 中文</span>
                </button>
                <button class="btn-primary" onclick="showEditor()" data-i18n="writeNote">+ 写笔记</button>
            </div>
        </header>

        <!-- 笔记列表 -->
        <main class="main-content">
            <div id="notes-list" class="notes-grid">
                <!-- 笔记卡片将在这里动态生成 -->
            </div>
            
            <!-- 空状态提示 -->
            <div id="empty-state" class="empty-state" style="display: none;">
                <div class="empty-icon">📝</div>
                <h3 data-i18n="emptyTitle">还没有笔记</h3>
                <p data-i18n="emptyDesc">点击"写笔记"按钮，开始记录你的第一本书吧！</p>
            </div>
        </main>

        <!-- 为你推荐 -->
        <section id="recommendation-section" class="recommendation-section" style="display: none;">
            <div class="recommendation-header">
                <h2 data-i18n="recommendTitle">🎯 为你推荐</h2>
                <p data-i18n="recommendDesc">根据你的阅读偏好，为你精选以下书籍</p>
            </div>
            <div id="recommendation-list" class="recommendation-grid">
                <!-- 推荐书籍将在这里动态生成 -->
            </div>
        </section>

        <!-- 编辑器弹窗 -->
        <div id="editor-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 data-i18n="editorTitle">写读书笔记</h2>
                    <button class="close-btn" onclick="closeEditor()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="book-title" data-i18n="bookName">书名</label>
                        <input type="text" id="book-title" data-i18n-placeholder="bookNamePlaceholder">
                    </div>
                    <div class="form-group">
                        <label for="book-author" data-i18n="bookAuthor">作者</label>
                        <input type="text" id="book-author" data-i18n-placeholder="authorPlaceholder">
                    </div>
                    <div class="form-group">
                        <label for="note-content" data-i18n="noteContent">笔记内容</label>
                        <div class="toolbar">
                            <button type="button" onclick="formatText('bold')" title="加粗"><strong>B</strong></button>
                            <button type="button" onclick="formatText('italic')" title="斜体"><em>I</em></button>
                            <button type="button" onclick="formatText('underline')" title="下划线"><u>U</u></button>
                            <span class="separator">|</span>
                            <button type="button" onclick="formatText('insertUnorderedList')" title="列表">• <span data-i18n="list">列表</span></button>
                            <button type="button" onclick="formatText('insertOrderedList')" title="编号列表">1. <span data-i18n="numberedList">列表</span></button>
                            <span class="separator">|</span>
                            <label class="upload-btn">
                                📷 <span data-i18n="insertImage">插入图片</span>
                                <input type="file" id="image-input" accept="image/*" onchange="handleImageUpload(event)">
                            </label>
                        </div>
                        <div id="editor" class="editor" contenteditable="true" data-i18n-placeholder="editorPlaceholder"></div>
                    </div>
                    <div class="form-group">
                        <label data-i18n="coverImage">封面图片</label>
                        <div class="cover-upload">
                            <div id="cover-preview" class="cover-preview" onclick="document.getElementById('cover-input').click()">
                                <span class="upload-placeholder" data-i18n="uploadCover">点击上传封面</span>
                            </div>
                            <input type="file" id="cover-input" accept="image/*" onchange="handleCoverUpload(event)">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" onclick="closeEditor()" data-i18n="cancel">取消</button>
                    <button class="btn-primary" onclick="saveNote()" data-i18n="saveNote">保存笔记</button>
                </div>
            </div>
        </div>

        <!-- 详情弹窗 -->
        <div id="detail-modal" class="modal" style="display: none;">
            <div class="modal-content detail-content">
                <div class="modal-header">
                    <h2 id="detail-title"></h2>
                    <button class="close-btn" onclick="closeDetail()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="detail-meta">
                        <span class="author">✍️ <span id="detail-author"></span></span>
                        <span class="date">📅 <span id="detail-date"></span></span>
                    </div>
                    <div id="detail-cover" class="detail-cover"></div>
                    <div id="detail-content" class="detail-text"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn-danger" onclick="deleteCurrentNote()" data-i18n="deleteNote">删除笔记</button>
                    <button class="btn-secondary" onclick="closeDetail()" data-i18n="close">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
